<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>轉盤控制台</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e0ef;
      --primary: #2563eb;
      --danger: #b42318;
      --good: #067647;
      --shadow: 0 18px 44px rgba(23, 32, 51, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--ink);
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(520px, calc(100% - 32px));
      border: 2px solid var(--ink);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 22px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 28px;
      letter-spacing: 0;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-weight: 800;
    }

    input,
    button {
      font: inherit;
    }

    input {
      width: 100%;
      min-height: 50px;
      border: 2px solid var(--line);
      border-radius: 12px;
      padding: 0 14px;
      color: var(--ink);
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      min-height: 48px;
      border: 2px solid var(--ink);
      border-radius: 12px;
      background: #fff;
      color: var(--ink);
      font-weight: 900;
      cursor: pointer;
    }

    button.primary {
      background: var(--primary);
      color: #fff;
    }

    button.danger {
      color: var(--danger);
    }

    .status {
      margin: 16px 0 0;
      border: 2px solid var(--line);
      border-radius: 12px;
      background: #f8fafc;
      padding: 12px;
      color: var(--good);
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .link {
      display: inline-block;
      margin-top: 14px;
      color: var(--primary);
      font-weight: 800;
      text-decoration: none;
    }

    @media (max-width: 520px) {
      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>轉盤控制台</h1>

    <label for="targetInput">指定中獎文字</label>
    <input id="targetInput" type="text" autocomplete="off" placeholder="例如：第五組">

    <div class="actions">
      <button class="primary" id="saveBtn" type="button">套用指定</button>
      <button class="danger" id="clearBtn" type="button">清除指定</button>
    </div>

    <div class="status" id="status"></div>
    <a class="link" href="./zifan-wheel.html" target="_blank" rel="noopener">開啟轉盤</a>
  </main>

  <script>
    const targetStorageKey = "zifan-wheel-target-text";
    const targetChannelName = "zifan-wheel-target-channel";
    const targetChannel = "BroadcastChannel" in window ? new BroadcastChannel(targetChannelName) : null;
    const input = document.getElementById("targetInput");
    const saveBtn = document.getElementById("saveBtn");
    const clearBtn = document.getElementById("clearBtn");
    const status = document.getElementById("status");
    let composing = false;
    let liveSaveTimer = 0;

    function normalizeText(text) {
      return text.trim().replace(/\s+/g, " ");
    }

    function renderStatus() {
      const target = localStorage.getItem(targetStorageKey) || "";
      input.value = target;
      status.textContent = target ? `目前指定：${target}` : "目前未指定，轉盤會正常隨機抽選";
    }

    function setTarget(target) {
      target = normalizeText(target);
      localStorage.setItem(targetStorageKey, target);
      status.textContent = target ? `目前指定：${target}` : "目前未指定，轉盤會正常隨機抽選";
      if (targetChannel) {
        targetChannel.postMessage({
          type: "target",
          target,
          updatedAt: Date.now()
        });
      }
    }

    function scheduleLiveSave() {
      window.clearTimeout(liveSaveTimer);
      liveSaveTimer = window.setTimeout(() => {
        setTarget(input.value);
      }, 120);
    }

    saveBtn.addEventListener("click", () => {
      setTarget(input.value);
    });

    clearBtn.addEventListener("click", () => {
      input.value = "";
      setTarget("");
    });

    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") saveBtn.click();
    });
    input.addEventListener("compositionstart", () => {
      composing = true;
    });
    input.addEventListener("compositionend", () => {
      composing = false;
      setTarget(input.value);
    });
    input.addEventListener("input", () => {
      if (!composing) scheduleLiveSave();
    });

    renderStatus();
  </script>
</body>
</html>
